<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player de Curso - Instituto Buriti</title>
    <link rel="stylesheet" href="../css/mobile-base.css">
    <link rel="stylesheet" href="../css/mobile-effects.css">
    <style>
        .player-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
            padding: 20px;
            min-height: calc(100vh - 80px);
        }

        .main-content {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .video-player {
            width: 100%;
            height: 400px;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2em;
            position: relative;
        }

        .play-button {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(151, 60, 191, 0.9);
            border: none;
            color: white;
            font-size: 2em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .play-button:hover {
            background: rgba(151, 60, 191, 1);
            transform: scale(1.1);
        }

        .lesson-info {
            padding: 20px;
        }

        .lesson-title {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .lesson-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            color: #666;
            font-size: 0.9em;
        }

        .lesson-description {
            line-height: 1.6;
            color: #555;
            margin-bottom: 20px;
        }

        .lesson-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .primary-btn {
            background: linear-gradient(135deg, #973CBF, #A95028);
            color: white;
        }

        .primary-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(151, 60, 191, 0.3);
        }

        .secondary-btn {
            background: #f8f9fa;
            color: #333;
            border: 2px solid #e0e0e0;
        }

        .secondary-btn:hover {
            background: #e9ecef;
            border-color: #973CBF;
        }

        .sidebar {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .sidebar-header {
            background: linear-gradient(135deg, #973CBF, #A95028);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .course-title {
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .course-progress {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-bar {
            background: white;
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .modules-list {
            max-height: calc(100vh - 300px);
            overflow-y: auto;
        }

        .module {
            border-bottom: 1px solid #eee;
        }

        .module-header {
            padding: 15px 20px;
            background: #f8f9fa;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            color: #333;
        }

        .module-header:hover {
            background: #e9ecef;
        }

        .module-header.active {
            background: #973CBF;
            color: white;
        }

        .lessons-list {
            display: none;
        }

        .lessons-list.active {
            display: block;
        }

        .lesson-item {
            padding: 12px 20px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .lesson-item:hover {
            background: #f8f9fa;
        }

        .lesson-item.current {
            background: rgba(151, 60, 191, 0.1);
            border-left: 4px solid #973CBF;
        }

        .lesson-item.completed {
            color: #4CAF50;
        }

        .lesson-icon {
            width: 20px;
            text-align: center;
        }

        .lesson-details {
            flex: 1;
        }

        .lesson-name {
            font-weight: 500;
            margin-bottom: 2px;
        }

        .lesson-duration {
            font-size: 0.8em;
            color: #666;
        }

        .completion-status {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
        }

        .completion-status.completed {
            background: #4CAF50;
            border-color: #4CAF50;
            color: white;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #973CBF;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .player-container {
                grid-template-columns: 1fr;
                padding: 10px;
                gap: 10px;
            }

            .video-player {
                height: 250px;
            }

            .sidebar {
                order: -1;
            }

            .modules-list {
                max-height: 300px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="mobile-header">
        <div class="header-content">
            <a href="../index.html" class="logo">
                <img src="https://i.imgur.com/placeholder-logo.png" alt="Instituto Buriti" onerror="this.style.display='none'">
                <span class="logo-text">Instituto Buriti</span>
            </a>
            <button class="menu-toggle" id="menuToggle">☰</button>
        </div>
    </header>

    <!-- Menu Mobile -->
    <nav class="mobile-menu" id="mobileMenu">
        <div class="menu-header">
            <span class="menu-title">Menu</span>
            <button class="menu-close" id="menuClose">✕</button>
        </div>
        <ul class="menu-items">
            <li><a href="../index.html">🏠 Home</a></li>
            <li><a href="meus-cursos.html">📚 Meus Cursos</a></li>
            <li><a href="dashboard-aluno.html">📊 Dashboard</a></li>
            <li><a href="#" onclick="logout()">🚪 Sair</a></li>
        </ul>
    </nav>

    <!-- Loading -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Carregando curso...</p>
    </div>

    <!-- Player Container -->
    <div class="player-container" id="playerContainer" style="display: none;">
        <!-- Main Content -->
        <div class="main-content">
            <div class="video-player" id="videoPlayer">
                <button class="play-button" onclick="playLesson()">▶</button>
            </div>
            <div class="lesson-info">
                <h1 class="lesson-title" id="lessonTitle">Carregando...</h1>
                <div class="lesson-meta">
                    <span id="lessonDuration">⏱️ --</span>
                    <span id="lessonType">📹 --</span>
                </div>
                <div class="lesson-description" id="lessonDescription">
                    Carregando descrição da aula...
                </div>
                <div class="lesson-actions">
                    <button class="action-btn primary-btn" onclick="markAsCompleted()" id="completeBtn">
                        ✅ Marcar como Concluída
                    </button>
                    <button class="action-btn secondary-btn" onclick="previousLesson()">
                        ⬅️ Anterior
                    </button>
                    <button class="action-btn secondary-btn" onclick="nextLesson()">
                        ➡️ Próxima
                    </button>
                </div>
            </div>
        </div>

        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="course-title" id="courseTitle">Carregando...</div>
                <div class="course-progress">
                    <div class="progress-bar" id="progressBar" style="width: 0%"></div>
                </div>
                <div id="progressText">0% concluído</div>
            </div>
            <div class="modules-list" id="modulesList">
                <!-- Módulos serão carregados dinamicamente -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/mobile-base.js"></script>
    <script src="../js/mobile-interactions.js"></script>
    <script src="../js/api-client.js"></script>
    <script>
        let courseData = null;
        let currentLesson = null;
        let courseId = null;

        // Inicializar página
        document.addEventListener('DOMContentLoaded', function() {
            checkAuthentication();
            
            // Obter course_id da URL
            const urlParams = new URLSearchParams(window.location.search);
            courseId = urlParams.get('course_id');
            
            if (!courseId) {
                alert('Curso não especificado');
                window.location.href = 'meus-cursos.html';
                return;
            }
            
            loadCourse();
        });

        // Verificar autenticação
        function checkAuthentication() {
            if (!apiClient.isAuthenticated()) {
                alert('Você precisa estar logado para acessar este curso');
                window.location.href = 'login.html';
                return;
            }
        }

        // Carregar dados do curso
        async function loadCourse() {
            try {
                showLoading(true);

                const response = await apiClient.makeRequest(`/enrollments/course/${courseId}`);
                const result = await response.json();

                if (result.success) {
                    courseData = result.course;
                    renderCourse();
                    
                    // Carregar primeira aula não concluída
                    const firstIncompleteLesson = findFirstIncompleteLesson();
                    if (firstIncompleteLesson) {
                        loadLesson(firstIncompleteLesson);
                    }
                } else {
                    throw new Error(result.error || 'Erro ao carregar curso');
                }
            } catch (error) {
                console.error('Erro ao carregar curso:', error);
                alert('Erro ao carregar curso: ' + error.message);
                window.location.href = 'meus-cursos.html';
            } finally {
                showLoading(false);
            }
        }

        // Renderizar curso
        function renderCourse() {
            document.getElementById('courseTitle').textContent = courseData.title;
            
            // Calcular progresso
            const progress = calculateProgress();
            document.getElementById('progressBar').style.width = progress.percentage + '%';
            document.getElementById('progressText').textContent = progress.percentage + '% concluído';
            
            // Renderizar módulos
            renderModules();
            
            document.getElementById('playerContainer').style.display = 'grid';
        }

        // Renderizar módulos
        function renderModules() {
            const modulesList = document.getElementById('modulesList');
            
            modulesList.innerHTML = courseData.modules.map((module, moduleIndex) => `
                <div class="module">
                    <div class="module-header" onclick="toggleModule(${moduleIndex})">
                        <span>${module.title}</span>
                        <span>▼</span>
                    </div>
                    <div class="lessons-list" id="module-${moduleIndex}">
                        ${module.lessons.map((lesson, lessonIndex) => `
                            <div class="lesson-item ${isLessonCompleted(lesson.id) ? 'completed' : ''}" 
                                 onclick="loadLesson('${lesson.id}')">
                                <div class="lesson-icon">
                                    ${getLessonIcon(lesson.type)}
                                </div>
                                <div class="lesson-details">
                                    <div class="lesson-name">${lesson.title}</div>
                                    <div class="lesson-duration">${lesson.duration}</div>
                                </div>
                                <div class="completion-status ${isLessonCompleted(lesson.id) ? 'completed' : ''}">
                                    ${isLessonCompleted(lesson.id) ? '✓' : ''}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        // Alternar módulo
        function toggleModule(moduleIndex) {
            const moduleElement = document.getElementById(`module-${moduleIndex}`);
            const isActive = moduleElement.classList.contains('active');
            
            // Fechar todos os módulos
            document.querySelectorAll('.lessons-list').forEach(list => {
                list.classList.remove('active');
            });
            
            // Abrir módulo clicado se não estava ativo
            if (!isActive) {
                moduleElement.classList.add('active');
            }
        }

        // Carregar aula
        function loadLesson(lessonId) {
            currentLesson = findLessonById(lessonId);
            if (!currentLesson) return;
            
            // Atualizar interface
            document.getElementById('lessonTitle').textContent = currentLesson.title;
            document.getElementById('lessonDuration').textContent = `⏱️ ${currentLesson.duration}`;
            document.getElementById('lessonType').textContent = `${getLessonIcon(currentLesson.type)} ${getLessonTypeName(currentLesson.type)}`;
            
            // Descrição simulada
            document.getElementById('lessonDescription').textContent = 
                `Esta aula aborda ${currentLesson.title.toLowerCase()} de forma prática e didática. ` +
                `Você aprenderá conceitos fundamentais e aplicações práticas.`;
            
            // Atualizar botão de conclusão
            const completeBtn = document.getElementById('completeBtn');
            if (isLessonCompleted(lessonId)) {
                completeBtn.textContent = '✅ Concluída';
                completeBtn.disabled = true;
                completeBtn.style.opacity = '0.6';
            } else {
                completeBtn.textContent = '✅ Marcar como Concluída';
                completeBtn.disabled = false;
                completeBtn.style.opacity = '1';
            }
            
            // Destacar aula atual
            document.querySelectorAll('.lesson-item').forEach(item => {
                item.classList.remove('current');
            });
            document.querySelector(`[onclick="loadLesson('${lessonId}')"]`).classList.add('current');
        }

        // Reproduzir aula
        function playLesson() {
            if (!currentLesson) return;
            
            // Simular reprodução
            document.getElementById('videoPlayer').innerHTML = `
                <div style="color: white; text-align: center;">
                    <h3>🎬 Reproduzindo: ${currentLesson.title}</h3>
                    <p>Duração: ${currentLesson.duration}</p>
                    <button onclick="pauseLesson()" style="margin-top: 20px; padding: 10px 20px; background: rgba(255,255,255,0.2); border: 2px solid white; color: white; border-radius: 5px; cursor: pointer;">
                        ⏸️ Pausar
                    </button>
                </div>
            `;
        }

        // Pausar aula
        function pauseLesson() {
            document.getElementById('videoPlayer').innerHTML = `
                <button class="play-button" onclick="playLesson()">▶</button>
            `;
        }

        // Marcar como concluída
        async function markAsCompleted() {
            if (!currentLesson) return;
            
            try {
                const response = await apiClient.makeRequest(
                    `/enrollments/course/${courseId}/lesson/${currentLesson.id}/complete`,
                    'POST'
                );
                const result = await response.json();

                if (result.success) {
                    // Atualizar interface
                    const completeBtn = document.getElementById('completeBtn');
                    completeBtn.textContent = '✅ Concluída';
                    completeBtn.disabled = true;
                    completeBtn.style.opacity = '0.6';
                    
                    // Atualizar progresso
                    const progress = result.progress;
                    document.getElementById('progressBar').style.width = progress.percentage + '%';
                    document.getElementById('progressText').textContent = progress.percentage + '% concluído';
                    
                    // Marcar aula como concluída na lista
                    const lessonElement = document.querySelector(`[onclick="loadLesson('${currentLesson.id}')"]`);
                    lessonElement.classList.add('completed');
                    lessonElement.querySelector('.completion-status').classList.add('completed');
                    lessonElement.querySelector('.completion-status').textContent = '✓';
                    
                    // Verificar se curso foi concluído
                    if (progress.percentage === 100) {
                        alert('🎉 Parabéns! Você concluiu o curso!');
                    } else {
                        // Ir para próxima aula automaticamente
                        setTimeout(() => {
                            nextLesson();
                        }, 1000);
                    }
                } else {
                    throw new Error(result.error || 'Erro ao marcar aula como concluída');
                }
            } catch (error) {
                console.error('Erro ao marcar aula:', error);
                alert('Erro ao marcar aula como concluída: ' + error.message);
            }
        }

        // Aula anterior
        function previousLesson() {
            const prevLesson = findPreviousLesson();
            if (prevLesson) {
                loadLesson(prevLesson.id);
            }
        }

        // Próxima aula
        function nextLesson() {
            const nextLesson = findNextLesson();
            if (nextLesson) {
                loadLesson(nextLesson.id);
            }
        }

        // Funções auxiliares
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        function calculateProgress() {
            if (!courseData || !courseData.user_progress) return { percentage: 0 };
            
            const completedLessons = courseData.user_progress.completed_lessons || [];
            const totalLessons = courseData.modules.reduce((total, module) => total + module.lessons.length, 0);
            
            return {
                percentage: Math.round((completedLessons.length / totalLessons) * 100),
                completed: completedLessons.length,
                total: totalLessons
            };
        }

        function isLessonCompleted(lessonId) {
            if (!courseData || !courseData.user_progress) return false;
            return (courseData.user_progress.completed_lessons || []).includes(lessonId);
        }

        function findLessonById(lessonId) {
            for (const module of courseData.modules) {
                for (const lesson of module.lessons) {
                    if (lesson.id === lessonId) {
                        return lesson;
                    }
                }
            }
            return null;
        }

        function findFirstIncompleteLesson() {
            for (const module of courseData.modules) {
                for (const lesson of module.lessons) {
                    if (!isLessonCompleted(lesson.id)) {
                        return lesson.id;
                    }
                }
            }
            return null;
        }

        function findNextLesson() {
            if (!currentLesson) return null;
            
            let foundCurrent = false;
            for (const module of courseData.modules) {
                for (const lesson of module.lessons) {
                    if (foundCurrent) {
                        return lesson;
                    }
                    if (lesson.id === currentLesson.id) {
                        foundCurrent = true;
                    }
                }
            }
            return null;
        }

        function findPreviousLesson() {
            if (!currentLesson) return null;
            
            let previousLesson = null;
            for (const module of courseData.modules) {
                for (const lesson of module.lessons) {
                    if (lesson.id === currentLesson.id) {
                        return previousLesson;
                    }
                    previousLesson = lesson;
                }
            }
            return null;
        }

        function getLessonIcon(type) {
            const icons = {
                'video': '🎬',
                'quiz': '❓',
                'practical': '💻',
                'project': '🚀',
                'reading': '📖'
            };
            return icons[type] || '📄';
        }

        function getLessonTypeName(type) {
            const names = {
                'video': 'Vídeo',
                'quiz': 'Quiz',
                'practical': 'Prática',
                'project': 'Projeto',
                'reading': 'Leitura'
            };
            return names[type] || 'Conteúdo';
        }

        // Logout
        function logout() {
            if (confirm('Deseja realmente sair?')) {
                apiClient.logout();
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
</html>
